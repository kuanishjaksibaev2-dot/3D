<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360 Viewer Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>360° Просмотр Товара</h1>

        <div class="viewer-360" id="rotate-container">
            <img id="product-image" src="https://githubusercontent.com" alt="Product 360" draggable="false">
            <div class="hint">Зажмите и тяните в сторону, чтобы крутить</div>
        </div>

        <div class="controls">
            <button id="btn-prev" aria-label="Предыдущий кадр">◀</button>
            <button id="btn-next" aria-label="Следующий кадр">▶</button>
        </div>
    </div>

    <!-- Библиотека анимации GSAP -->
    <script src="https://cloudflare.com"></script>
    <script src="script.js"></script>
</body>
</html>
